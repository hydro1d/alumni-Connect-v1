<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Board - AlumniConnect</title>
    <link href="/src/style.css" rel="stylesheet">
</head>
<body class="bg-base-200 pb-12 min-h-screen flex flex-col fade-in">

    <div id="navbar-container"></div>

    <main class="container mx-auto mt-6 px-4 flex-grow max-w-5xl">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-gradient-to-r from-primary to-secondary p-8 rounded-3xl text-white shadow-2xl mb-10 overflow-hidden relative">
            <div class="absolute inset-0 opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPgo8cmVjdCB3aWR0aD0iOCIgaGVpZ2h0PSI4IiBmaWxsPSIjZmZmIiBmaWxsLW9wYWNpdHk9IjAuMSI+PC9yZWN0Pgo8cGF0aCBkPSJNMCAwbDhfOHptOCAwTDBfOHoiIHN0cm9rZT0iIzAwMCIgc3Ryb2tlLW9wYWNpdHk9IjAuMSI+PC9wYXRoPjwvc3ZnPg==')] pointer-events-none"></div>
            <div class="relative z-10 text-center md:text-left mb-6 md:mb-0">
                <h1 class="text-4xl font-extrabold tracking-tight">Opportunities Board</h1>
                <p class="text-primary-content mt-2 max-w-md opacity-90 text-lg">Exclusive job listings and internships posted directly by our alumni network.</p>
            </div>
            <div id="post-job-action" class="relative z-10 w-full md:w-auto"></div>
        </div>

        <div id="jobs-grid" class="flex flex-col gap-5 w-full mx-auto">
            <!-- Cards render here -->
            <div class="flex justify-center py-20"><span class="loading loading-spinner text-primary loading-lg"></span></div>
        </div>

    </main>

    <!-- Modal for Posting Job -->
    <dialog id="job_modal" class="modal modal-bottom sm:modal-middle">
        <form method="dialog" class="modal-box bg-base-100 rounded-3xl" id="job-form">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4" type="button" onclick="job_modal.close()">✕</button>
            <h3 class="font-extrabold text-2xl mb-6 flex items-center gap-2">
                <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                Post an Opportunity
            </h3>
            
            <div class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Job Title</span></label>
                    <input type="text" id="job-title" class="input input-bordered focus:border-primary focus:bg-base-100 bg-base-200/50" required placeholder="e.g. Junior UI/UX Designer" />
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Company</span></label>
                        <input type="text" id="job-company" class="input input-bordered focus:border-primary focus:bg-base-100 bg-base-200/50" required placeholder="e.g. Spotify" />
                    </div>
                    <div class="form-control">
                        <label class="label"><span class="label-text font-medium">Location</span></label>
                        <input type="text" id="job-location" class="input input-bordered focus:border-primary focus:bg-base-100 bg-base-200/50" placeholder="e.g. Remote, or New York" />
                    </div>
                </div>

                <div class="form-control">
                    <label class="label"><span class="label-text font-medium">Description & Requirements</span></label>
                    <textarea id="job-description" class="textarea textarea-bordered focus:border-primary focus:bg-base-100 bg-base-200/50 min-h-[120px]" required placeholder="Describe the role, ideal candidate, and how they should apply (email, link, etc)..."></textarea>
                </div>
            </div>
            
            <div class="modal-action mt-8">
                <button type="submit" class="btn btn-primary w-full h-12 text-md rounded-xl shadow-lg">Publish to Network</button>
            </div>
        </form>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script type="module">
        import { checkAuth, fetchAPI, showToast } from './js/api.js';
        import { loadNavbar } from './js/navbar.js';

        const user = checkAuth();
        if (user) {
            loadNavbar();
            if (user.role === 'Alumni') {
                document.getElementById('post-job-action').innerHTML = `
                    <button class="btn btn-neutral bg-white text-primary border-none hover:bg-gray-100 w-full md:w-auto h-12 px-8 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2" onclick="job_modal.showModal()">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Post New Job
                    </button>
                `;
            }
            loadJobs();
        }

        async function loadJobs() {
            const grid = document.getElementById('jobs-grid');
            try {
                const jobs = await fetchAPI('/jobs');
                if (jobs.length === 0) {
                    grid.innerHTML = `
                        <div class="text-center py-20 glass-panel rounded-3xl">
                            <p class="text-gray-500 font-medium text-lg">No job opportunities posted yet.</p>
                            ${user.role === 'Alumni' ? '<p class="text-primary mt-2">Be the first to share an opportunity with our students!</p>' : ''}
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = jobs.map(job => `
                    <div class="glass-panel rounded-3xl p-6 sm:p-8 hover-lift border border-base-200/60 relative group">
                        
                        <div class="flex flex-col sm:flex-row justify-between items-start gap-4 mb-4">
                            <div class="flex items-center gap-5">
                                <!-- Fake Company Logo Placeholder -->
                                <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-gray-100 to-gray-200 border border-gray-300 flex items-center justify-center text-primary font-bold text-2xl shadow-sm">
                                    ${job.company.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <h2 class="text-2xl font-extrabold tracking-tight leading-none mb-1">${job.title}</h2>
                                    <p class="text-primary font-bold text-md flex items-center gap-1.5">
                                        ${job.company}
                                        ${job.location ? `<span class="text-gray-400 font-normal"> • ${job.location}</span>` : ''}
                                    </p>
                                </div>
                            </div>
                            
                            <div class="text-right w-full sm:w-auto mt-2 sm:mt-0">
                                <span class="badge badge-error badge-outline font-semibold mb-1 shadow-sm opacity-90 hidden group-hover:inline-flex transition-all">Actively Hiring</span>
                                <p class="text-xs text-gray-500 font-medium whitespace-nowrap">${new Date(job.created_at).toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'})}</p>
                            </div>
                        </div>
                        
                        <div class="divider my-2 opacity-50"></div>
                        
                        <p class="whitespace-pre-line text-gray-600 leading-relaxed text-sm md:text-base mb-6 
                                  line-clamp-3 group-hover:line-clamp-none transition-all duration-500 overflow-hidden relative">
                            ${job.description}
                        </p>
                        
                        <div class="flex flex-col sm:flex-row justify-between items-center pt-4 border-t border-base-200/50 mt-auto bg-base-100/30 -mx-6 -mb-6 px-6 py-4 rounded-b-3xl">
                            <div class="flex items-center gap-2 mb-4 sm:mb-0">
                                <div class="avatar">
                                    <div class="w-7 rounded-full bg-neutral text-white flex items-center justify-center font-bold text-xs">
                                        ${job.posted_by_name.charAt(0)}
                                    </div>
                                </div>
                                <span class="text-xs text-gray-500 font-medium">Posted by <span class="font-bold text-base-content">${job.posted_by_name}</span> (${job.department || 'Alumni'})</span>
                            </div>
                            
                            ${user.role === 'Student' ? 
                                `<button class="btn btn-primary btn-sm rounded-lg px-6 w-full sm:w-auto shadow-md" onclick="showToast('Feature to apply internally is coming soon! Read description for external apply links.', 'success')">Apply Now</button>` 
                                : '<span class="text-xs text-gray-400 font-medium">Alumni Preview</span>'}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                grid.innerHTML = '<div class="col-span-full p-4 bg-error/10 text-error rounded-xl font-medium text-center">Failed to load jobs.</div>';
            }
        }

        document.getElementById('job-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading loading-spinner"></span> Publishing...';
            btn.disabled = true;

            try {
                await fetchAPI('/jobs', {
                    method: 'POST',
                    body: JSON.stringify({
                        title: document.getElementById('job-title').value,
                        company: document.getElementById('job-company').value,
                        location: document.getElementById('job-location').value,
                        description: document.getElementById('job-description').value
                    })
                });
                
                showToast('Job posted to the network!', 'success');
                document.getElementById('job_modal').close();
                e.target.reset();
                loadJobs();
            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
